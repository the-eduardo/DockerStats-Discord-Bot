services:
  socket-proxy:
    image: tecnativa/docker-socket-proxy:v0.4.2
    container_name: dsbot-socket-proxy
    restart: always
    environment:
      # Mínimo provado pelo código (internal/dockerx):
      # GET list/inspect/logs/stats + POST start/stop/restart/pause/unpause
      # + exec-create (POST /containers/{id}/exec).
      - CONTAINERS=1
      - POST=1
      # /exec/{id}/start e /exec/{id}/json (segunda perna do /exec).
      - EXEC=1
      # GET /info (NCPU/MemTotal).
      - INFO=1
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro

  dockerbot:
    container_name: Docker-StatusBot
    build:
      context: .
      dockerfile: Dockerfile
    restart: always
    depends_on:
      - socket-proxy
    volumes:
      # docker.sock NÃO é mais montado — acesso via socket-proxy (DOCKER_HOST).
      # Disco do HOST montado read-only para o /status reportar uso real.
      - /:/host:ro
      # Persiste a referência do painel (canal + id da mensagem) entre restarts.
      - dsbot-data:/app/data
      # Chave SSH para hosts remotos (Fase 4). O arquivo no host DEVE ser
      # root:root 600, senão o ssh recusa a chave. Comente se for single-host.
      - /root/dsbot-secrets/master.key:/root/.ssh/master.key:ro
    environment:
      # Client local (dockerx.NewLocal usa client.FromEnv) fala com o proxy;
      # o host remoto (Master) continua via ssh:// e não passa por aqui.
      DOCKER_HOST: tcp://socket-proxy:2375
      DISCORD_TOKEN: ${DISCORD_TOKEN}
      DISCORD_OWNER_ID: ${DISCORD_OWNER_ID}
      DISCORD_GUILD_ID: ${DISCORD_GUILD_ID:-}
      HOSTNAME: ${HOSTNAME:-Machine}
      SHUTDOWN_TIMEOUT: ${SHUTDOWN_TIMEOUT:-10}
      DISK_PATH: ${DISK_PATH:-/host}
      # Dashboard persistente (Fase 2):
      DASHBOARD_CHANNEL_ID: ${DASHBOARD_CHANNEL_ID:-}
      REFRESH_SECONDS: ${REFRESH_SECONDS:-60}
      DATA_DIR: ${DATA_DIR:-/app/data}
      # Multi-host (Fase 4). Formato: "key,Label,ssh://user@ip[,/chave]" (; separa vários).
      REMOTE_HOSTS: ${REMOTE_HOSTS:-}
      # Hardening (Fase 5):
      AUDIT_CHANNEL_ID: ${AUDIT_CHANNEL_ID:-}
      EXEC_ALLOWLIST: ${EXEC_ALLOWLIST:-}

volumes:
  dsbot-data:
